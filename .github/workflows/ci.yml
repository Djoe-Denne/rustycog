name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_BACKTRACE: 1
  RUN_ENV: test

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path rustycog-testing/Cargo.toml --all -- --check

  test-coverage:
    name: Unit Tests And Coverage
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: unit-coverage
          cache-on-failure: true

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run unit tests with coverage
        run: |
          set +e
          cargo llvm-cov -p rustycog --locked --all-features --no-report --no-fail-fast --lib --bins
          test_status=$?
          set -e

          if [ "$test_status" -eq 0 ]; then
            cargo llvm-cov report --lcov --output-path lcov.info
          else
            echo "Skipping coverage report generation because test run failed."
            : > lcov.info
          fi

          exit "$test_status"

      - name: Check rustycog-testing crate
        run: cargo check --manifest-path rustycog-testing/Cargo.toml --all-targets

      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: warn

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-on-failure: true

      - name: Run Clippy (non-blocking)
        continue-on-error: true
        run: |
          cargo clippy -p rustycog --locked --all-features --lib --bins --examples --benches -- -D warnings
          cargo clippy --manifest-path rustycog-testing/Cargo.toml --all-targets -- -D warnings

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test-coverage, clippy]
    if: ${{ always() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lcov
          path: .

      - name: Ensure coverage report exists
        run: |
          if [ ! -f lcov.info ]; then
            echo "No coverage artifact found; creating an empty report so Sonar can still run."
            : > lcov.info
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sonar
          cache-on-failure: true

      - name: Run Clippy report (production vs tests)
        run: |
          mkdir -p target/sonar

          # Shared Clippy groups (stricter than workspace Cargo.toml defaults).
          common_clippy=(
            -W clippy::all
            -W clippy::pedantic
            -W clippy::nursery
            -W clippy::cargo
            -W clippy::todo
            -W clippy::unimplemented
            -A clippy::cargo_common_metadata
            -A clippy::multiple_crate_versions
          )

          # Production: lib, binaries, examples (not tests/, not #[cfg(test)] in lib).
          cargo clippy -p rustycog --locked --all-features --lib --bins --examples --message-format=json -- \
            "${common_clippy[@]}" \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            > target/sonar/clippy-production.jsonl

          # Tests and benches: same groups, but allow unwrap/expect/panic where typical for tests.
          cargo clippy -p rustycog --locked --all-features --tests --benches --message-format=json -- \
            "${common_clippy[@]}" \
            -A clippy::unwrap_used \
            -A clippy::expect_used \
            -A clippy::panic \
            > target/sonar/clippy-tests.jsonl

          # One report for Sonar (newline-delimited JSON). Possible duplicate lines for lib if
          # the tests pass also type-checks the same crate; Sonar usually dedupes by rule + location.
          cat target/sonar/clippy-production.jsonl target/sonar/clippy-tests.jsonl > target/sonar/clippy.json

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.rust.lcov.reportPaths=lcov.info
