name: Publish crates (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-framework:
    name: Package and publish rustycog-framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libssl-dev \
            libsasl2-dev \
            libzstd-dev \
            liblz4-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate workspace build
        run: cargo check -p rustycog-framework --all-targets --all-features --locked

      - name: Package crate
        run: cargo package -p rustycog-framework --locked --features testing

      - name: Publish crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          log_file="$(mktemp)"

          set +e
          cargo publish -p rustycog-framework --locked --features testing 2>&1 | tee "${log_file}"
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            rm -f "${log_file}"
            exit 0
          fi

          if rg -q "already uploaded|already exists" "${log_file}"; then
            echo "rustycog-framework is already published at this version. Continuing."
            rm -f "${log_file}"
            exit 0
          fi

          rm -f "${log_file}"
          exit "$status"
