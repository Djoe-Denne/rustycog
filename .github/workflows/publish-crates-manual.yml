name: Publish crates (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-framework:
    name: Package and publish rustycog-framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate workspace build
        run: cargo check --workspace --all-targets --locked

      - name: Package crate
        run: cargo package -p rustycog-framework --locked

      - name: Publish crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          max_attempts=8
          sleep_seconds=20
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Publishing rustycog-framework (attempt ${attempt}/${max_attempts})"
            log_file="$(mktemp)"

            set +e
            cargo publish -p rustycog-framework --locked 2>&1 | tee "${log_file}"
            status=${PIPESTATUS[0]}
            set -e

            if [ "$status" -eq 0 ]; then
              rm -f "${log_file}"
              exit 0
            fi

            if rg -q "already uploaded|already exists" "${log_file}"; then
              echo "rustycog-framework is already published at this version. Continuing."
              rm -f "${log_file}"
              exit 0
            fi

            rm -f "${log_file}"

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Publish failed. Retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi

            attempt=$((attempt + 1))
            sleep_seconds=$((sleep_seconds + 10))
          done

          echo "Failed to publish rustycog-framework after ${max_attempts} attempts."
          exit 1

  publish-testing:
    name: Package and publish rustycog-testing
    runs-on: ubuntu-latest
    needs: [publish-framework]
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            zlib1g-dev \
            libssl-dev \
            libsasl2-dev \
            libzstd-dev \
            liblz4-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-testing
          cache-on-failure: true

      - name: Validate framework build
        run: cargo check -p rustycog-framework --all-targets --all-features --locked

      - name: Validate testing crate build
        run: cargo check --manifest-path rustycog-testing/Cargo.toml --all-targets --locked

      - name: Package testing crate
        run: cargo package --manifest-path rustycog-testing/Cargo.toml --locked

      - name: Publish testing crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          max_attempts=8
          sleep_seconds=20
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Publishing rustycog-testing (attempt ${attempt}/${max_attempts})"
            log_file="$(mktemp)"

            set +e
            cargo publish --manifest-path rustycog-testing/Cargo.toml --locked 2>&1 | tee "${log_file}"
            status=${PIPESTATUS[0]}
            set -e

            if [ "$status" -eq 0 ]; then
              rm -f "${log_file}"
              exit 0
            fi

            if rg -q "already uploaded|already exists" "${log_file}"; then
              echo "rustycog-testing is already published at this version. Continuing."
              rm -f "${log_file}"
              exit 0
            fi

            rm -f "${log_file}"

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Publish failed. Retrying in ${sleep_seconds}s..."
              sleep "${sleep_seconds}"
            fi

            attempt=$((attempt + 1))
            sleep_seconds=$((sleep_seconds + 10))
          done

          echo "Failed to publish rustycog-testing after ${max_attempts} attempts."
          exit 1
