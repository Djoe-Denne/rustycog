name: Publish crates (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Package and publish workspace crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate workspace build
        run: cargo check --workspace --all-targets --locked

      - name: Package bootstrap crates before publish
        shell: bash
        run: |
          set -euo pipefail
          crates=(
            rustycog-core
            rustycog-config
          )

          for crate in "${crates[@]}"; do
            echo "::group::cargo package -p ${crate}"
            cargo package -p "${crate}" --locked
            echo "::endgroup::"
          done

      - name: Publish crates in dependency order
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          publish_with_retry() {
            local crate="$1"
            local max_attempts=8
            local sleep_seconds=20
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Publishing ${crate} (attempt ${attempt}/${max_attempts})"
              local log_file
              log_file="$(mktemp)"

              set +e
              cargo publish -p "${crate}" --locked 2>&1 | tee "${log_file}"
              local status=${PIPESTATUS[0]}
              set -e

              if [ "$status" -eq 0 ]; then
                rm -f "${log_file}"
                return 0
              fi

              if rg -q "already uploaded|already exists" "${log_file}"; then
                echo "${crate} is already published at this version. Continuing."
                rm -f "${log_file}"
                return 0
              fi

              rm -f "${log_file}"

              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Publish failed for ${crate}. Retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
              fi

              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds + 10))
            done

            echo "Failed to publish ${crate} after ${max_attempts} attempts."
            return 1
          }

          publish_layer() {
            local layer_name="$1"
            shift
            local crates=("$@")

            echo "Publishing ${layer_name}: ${crates[*]}"
            for crate in "${crates[@]}"; do
              publish_with_retry "${crate}"
            done
            echo "Waiting for crates.io index propagation..."
            sleep 20
          }

          publish_layer "layer0" \
            rustycog-core rustycog-config

          publish_layer "layer1" \
            rustycog-command rustycog-db rustycog-events \
            rustycog-logger rustycog-permission rustycog-server

          publish_layer "layer2" \
            rustycog-http rustycog-outbox

          publish_layer "layer3" \
            rustycog-testing
