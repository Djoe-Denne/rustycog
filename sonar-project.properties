sonar.projectKey=Djoe-Denne_rustycog
sonar.organization=djoe-denne06

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=RustyCog
sonar.projectVersion=0.1.0

# Rust workspace analysis.
sonar.sources=.
sonar.inclusions=**/*.rs
sonar.exclusions=target/**,**/target/**,**/.git/**,lcov.info
sonar.coverage.exclusions=**/tests/**,rustycog-testing/**,**/migration.rs,**/entity.rs
sonar.cpd.exclusions=**/tests/**,rustycog-testing/**,**/migration.rs,**/entity.rs
sonar.rust.lcov.reportPaths=lcov.info

sonar.rust.clippy.enabled=false
sonar.rust.clippyReport.reportPaths=target/sonar/clippy.json
